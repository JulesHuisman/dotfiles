font_size 16.0

# Catppuccin Mocha theme
include themes/mocha.conf

# Key remappings: move Ctrl+C and Ctrl+L actions to Cmd equivalents
# Cmd+C sends Ctrl+C (SIGINT) to the terminal
map super+c send_text all \x03

# Ctrl+C copies to clipboard (instead of sending SIGINT)
map ctrl+c copy_to_clipboard

# Cmd+L sends Ctrl+L (clear screen) to the terminal
map super+l send_text all \x0c

# Ctrl+L scrolls to prompt (instead of clearing screen)
map ctrl+l scroll_to_prompt -1

# Cmd+F sends Ctrl+F (tmux prefix) to the terminal
map super+f send_text all \x06
