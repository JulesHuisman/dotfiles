# Reload config
unbind r
bind r source-file ~/.tmux.conf

# Prefix: Ctrl+a
unbind C-b
set -g prefix C-f
bind C-f send-prefix

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"


# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Open new windows in current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Mouse support set -g mouse on
set -g mouse on

# Start windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Terminal settings
set-option -g default-terminal "tmux-256color"
# set-option -sa terminal-overrides ',xterm-kitty:RGB'

# Increase scrollback buffer
set -g history-limit 10000

# Reduce escape time (for vim)
set -sg escape-time 10

# Status bar
set -g status-position bottom
set -g status-interval 5
set -g status-left-length 100
set -g status-right-length 100

# Vi mode for copy
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# Hide claude sessions from session picker
bind w choose-tree -swZ -f '#{?#{m:claude*,#{session_name}},0,1}'

# Show lazygit
bind -r g display-popup -d '#{pane_current_path}' -w90% -h90% -E lazygit

# Open claude popup
bind -r u run-shell '\
  SESSION="claude-$(echo #{pane_current_path} | md5sum | cut -c1-8)"; \
  tmux has-session -t "$SESSION" 2>/dev/null || \
  tmux new-session -d -s "$SESSION" -c "#{pane_current_path}" "claude --dangerously-skip-permissions"; \
  tmux display-popup -w90% -h90% -E "tmux attach-session -t $SESSION"'
