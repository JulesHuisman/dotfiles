# Prefix: Ctrl+a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Open new windows in current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Mouse support
set -g mouse on

# Start windows and panes at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Terminal settings
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Increase scrollback buffer
set -g history-limit 10000

# Reduce escape time (for vim)
set -sg escape-time 10

# Status bar
set -g status-position bottom
set -g status-interval 5
set -g status-left " #S "
set -g status-right " %H:%M %d-%b "
set -g status-left-length 20
set -g status-right-length 30

# Switch windows with Cmd+number (requires iTerm2 key binding to send ESC+number)
bind -n "\e1" select-window -t 1
bind -n "\e2" select-window -t 2
bind -n "\e3" select-window -t 3
bind -n "\e4" select-window -t 4
bind -n "\e5" select-window -t 5

# Vi mode for copy
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
